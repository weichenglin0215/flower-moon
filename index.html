<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="花月">
    <title>花月 Flower Moon</title>

    <!-- 基礎樣式，responsive.css 必須在最前面，不要自作主張去調整順序 -->
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="achievement.css">
    <link rel="stylesheet" href="author_bio.css">
    <link rel="stylesheet" href="calendar.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="difficulty-selector.css">
    <link rel="stylesheet" href="game1.css">
    <link rel="stylesheet" href="game2.css">
    <link rel="stylesheet" href="game3.css">
    <link rel="stylesheet" href="game4.css">
    <link rel="stylesheet" href="game5.css">
    <link rel="stylesheet" href="game6.css">
    <link rel="stylesheet" href="game7.css">
    <link rel="stylesheet" href="game8.css">
    <link rel="stylesheet" href="game9.css">
    <link rel="stylesheet" href="game10.css">
    <link rel="stylesheet" href="game11.css">
    <link rel="stylesheet" href="game12.css">
    <link rel="stylesheet" href="gameMessage.css">
    <link rel="stylesheet" href="introCard.css">
    <link rel="stylesheet" href="level-selector.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="ruleNoteDialog.css">


    <!-- 字體與外部庫 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.js"></script>
</head>

<body>
    <!-- 選單會由 menu.js 動態插入 -->

    <!-- 主要內容區域：日曆 (預設顯示) -->
    <script>
        // 立即檢查是否需要開啟遊戲，如果是則隱藏日曆容器以避免閃爍
        if (window.location.search.includes('game=') || window.location.search.includes('page=')) {
            document.write('<style>#calendarCardContainer { display: none !important; }</style>');
        }
    </script>
    <div id="calendarCardContainer" class="aspect-5-8">
        <!-- JavaScript 會將卡片動態插入到這裡 -->
    </div>

    <!-- 卡片默背容器 (預設隱藏) -->
    <div id="cardContainer" class="aspect-5-8" style="display: none;">
        <!-- JavaScript 會將卡片動態插入到這裡 -->
    </div>

    <!-- 單張卡片默背的模板 -->
    <template id="cardTemplate">
        <div class="card">
            <!-- 左欄：詩詞名與作者，品牌標誌 -->
            <div class="col-left">
                <div class="poem-meta-and-logo-left">
                    <div class="poem-title"></div>
                    <div class="poem-author"></div>
                    <div class="brand-logo">花月</div>
                </div>
            </div>

            <!-- 中欄：詩詞名句 -->
            <div class="col-center">
                <div class="poem-content">
                    <!-- 詩句會動態插入 -->
                </div>
            </div>

            <!-- 右欄： -->
            <div class="col-right">

            </div>
        </div>
    </template>

    <!-- 單張卡片的模板 (Template) -->
    <template id="calendarCardTemplate">
        <div class="calendarCard">
            <!-- 左欄：詩詞名與作者與 Logo -->
            <div class="calendarCol-left">
                <div class="poem-meta-and-logo-left">
                    <div class="poem-title"></div>
                    <div class="poem-author"></div>
                    <div class="brand-logo">花月</div>
                </div>
            </div>

            <!-- 中欄：主要內容 (包含日期、詩詞) -->
            <div class="calendarCol-center">
                <div class="date-header">
                    <div class="year-month"></div>
                    <div class="day-number"></div>
                    <div class="weekday"></div>
                </div>

                <div class="poem-section">
                    <div class="poem-body vertical-text"></div>
                </div>
            </div>

            <!-- 右欄：農曆資訊 -->
            <div class="calendarCol-right">
                <div class="lunar-info vertical-text"></div>
                <div class="holidays-container"></div>
                <div class="lucky-unlucky">
                    <div class="activity good">
                        <span class="label">宜</span>
                        <span class="value"></span>
                    </div>
                    <div class="activity bad">
                        <span class="label">忌</span>
                        <span class="value"></span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 核心邏輯載入 要讓 responsive.js 在最前面，不要自作主張去調整順序-->
    <script src="responsive.js"></script>
    <script src="script.js"></script>
    <script src="data/author_biography.js"></script>
    <script src="data/poems.js"></script>
    <script src="data/calendar_assignments.js"></script>
    <script src="data/最常見詩詞字排名.js"></script>
    <script src="difficulty-selector.js"></script>
    <script src="level-selector.js"></script>
    <script src="menu.js"></script>
    <script src="poem_dialog.js"></script>

    <!-- 主要功能模組 -->
    <script src="achievement.js"></script>
    <script src="author_bio.js"></script>
    <script src="autoScreenshot.js"></script>
    <script src="calendar.js"></script>
    <script src="cards.js"></script>
    <script src="gameMessage.js"></script>
    <script src="introCard.js"></script>
    <script src="ruleNoteDialog.js"></script>
    <script src="scoreManager.js"></script>

    <!-- 遊戲模組 (預載入) -->
    <script src="game1.js"></script>
    <script src="game2.js"></script>
    <script src="game3.js"></script>
    <script src="game4.js"></script>
    <script src="game5.js"></script>
    <script src="game6.js"></script>
    <script src="game7.js"></script>
    <script src="game8.js"></script>
    <script src="game9.js"></script>
    <script src="game10.js"></script>
    <script src="game11.js"></script>
    <script src="game12.js"></script>

</body>

</html>
